name: AHP 2.0 Production Hardening CI/CD (GCP)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-audit:
    name: 🛡️ Security Guard (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Security Tools
        run: pip install bandit safety ruff

      - name: Run Ruff (Linting)
        run: ruff check .

      - name: Run Bandit (Security Scan)
        run: bandit -r app/ -v

      - name: Run Safety (Dependency Audit)
        run: pip freeze | safety check --stdin

  integrity-test:
    name: 🧪 Integrity Validation
    needs: security-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pydantic-settings python-jose[cryptography] google-cloud-storage

      - name: Run Production Readiness Audit
        env:
          ENVIRONMENT: production
          GCP_PROJECT_ID: "ahp-enterprise-prod"
          GCS_BUCKET_NAME: "ahp-medical-vault"
          DATABASE_URL: postgresql://remote-host/db
          REDIS_URL: redis://remote-redis:6379/0
          JWT_PRIVATE_KEY: "-----BEGIN RSA PRIVATE KEY-----\nValidKeyFormat\n-----END RSA PRIVATE KEY-----"
          JWT_PUBLIC_KEY: "-----BEGIN PUBLIC KEY-----\nValid\n-----END PUBLIC KEY-----"
          ENCRYPTION_KEY: "a" * 32
        run: python scratch/verify_hardening.py

  build-and-push:
    name: 📦 Build & Push (Artifact Registry)
    needs: integrity-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # --- GOOGLE CLOUD AUTHENTICATION ---
      # Uses Workload Identity Federation (No static keys in GitHub)
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v1'
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v1'

      - name: 'Configure Docker for GCP'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push to Artifact Registry
        run: |
          IMAGE_NAME="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ahp-repo/api-service"
          docker build -t $IMAGE_NAME:${{ github.sha }} .
          docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:latest
          docker push $IMAGE_NAME:latest

  deploy-to-gke:
    name: 🚀 GKE Deployment
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - id: 'auth'
        uses: 'google-github-actions/auth@v1'
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: 'Get GKE Credentials'
        uses: 'google-github-actions/get-gke-credentials@v1'
        with:
          cluster_name: 'ahp-prod-cluster'
          location: 'us-central1'

      - name: Apply K8s Manifests
        run: |
          IMAGE_NAME="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ahp-repo/api-service"
          sed -i "s|image: ahp-api:latest|image: $IMAGE_NAME:${{ github.sha }}|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/network-policy.yaml
