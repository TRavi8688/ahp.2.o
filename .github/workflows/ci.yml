name: AHP 2.0 Production Hardening CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-audit:
    name: 🛡️ Security Guard (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Security Tools
        run: pip install bandit safety ruff

      - name: Run Ruff (Linting)
        run: ruff check .

      - name: Run Bandit (Security Scan)
        # B101-B112: Checks for hardcoded secrets and weak crypto
        run: bandit -r app/ -v

      - name: Run Safety (Dependency Audit)
        # Fails if any library in requirements has a known CVE
        run: pip freeze | safety check --stdin

  integrity-test:
    name: 🧪 Integrity Validation
    needs: security-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pydantic-settings python-jose[cryptography]

      - name: Run Production Readiness Audit
        # This executes the fail-fast logic we built for config lockdown
        env:
          ENVIRONMENT: production
          # We provide dummy keys in a valid format to verify the logic passes correctly
          DATABASE_URL: postgresql://remote-host/db
          REDIS_URL: redis://remote-redis:6379/0
          JWT_PRIVATE_KEY: "-----BEGIN RSA PRIVATE KEY-----\nValidKeyFormat\n-----END RSA PRIVATE KEY-----"
          JWT_PUBLIC_KEY: "-----BEGIN PUBLIC KEY-----\nValid\n-----END PUBLIC KEY-----"
          S3_BUCKET_NAME: "test-vault"
          ENCRYPTION_KEY: "a" * 32
        run: python scratch/verify_hardening.py

  build-and-push:
    name: 📦 Build Production Container
    needs: integrity-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: actions/setup-docker-buildx@v2

      - name: Build Production Image
        # Tagging with the git commit SHA for traceability
        run: |
          docker build -t ahp-api:${{ github.sha }} .
          docker tag ahp-api:${{ github.sha }} ahp-api:latest

      # --- PLACEHOLDER FOR REGISTRY PUSH ---
      # - name: Login to ECR/DockerHub
      #   uses: docker/login-action@v2
      #   with:
      #     username: ${{ secrets.REGISTRY_USERNAME }}
      #     password: ${{ secrets.REGISTRY_PASSWORD }}
      
      # - name: Push to Registry
      #   run: docker push ahp-api:latest

  deploy-to-prod:
    name: 🚀 Production Cutover
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Update K8s Manifests
        # Google SRE Practice: Atomic update of the image tag in the deployment
        run: |
          sed -i 's|image: ahp-api:latest|image: ahp-api:${{ github.sha }}|g' k8s/deployment.yaml
      
      # - name: Apply to Kubernetes
      #   uses: azure/k8s-deploy@v1
      #   with:
      #     manifests: |
      #       k8s/deployment.yaml
      #       k8s/network-policy.yaml
      #     images: 'ahp-api:${{ github.sha }}'
