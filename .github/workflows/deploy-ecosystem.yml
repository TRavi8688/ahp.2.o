name: Deploy AHP 2.0 Ecosystem

on:
  push:
    branches:
      - main

jobs:
  run-tests:
    name: Run Automated Quality Gates
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Execute Pytest
        env:
          # Use Base64 encoded keys to prevent newline corruption in CI environment
          SECRET_KEY: "ci-test-secret-key-min-32-chars-long"
          JWT_PRIVATE_KEY: ""
          JWT_PUBLIC_KEY: ""
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          REDIS_URL: "redis://localhost:6379/0"
          ENCRYPTION_KEY: "Y2ktdGVzdC1lbmNyeXB0aW9uLWtleS1tdXN0LWJlLTMyLWJ5dGVz"
          ENVIRONMENT: "testing"
        run: |
          # Run core integrity and security tests
          # We ignore frontend directories and skip DB-heavy tests
          pytest -v -m "not needs_db" --ignore=doctor-app --ignore=patient-app


  auth-and-backend:
    name: Deploy Backend to Cloud Run
    needs: run-tests
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-deployer@ahp2o-495503.iam.gserviceaccount.com

      - name: Debug Identity
        run: |
          gcloud auth list
          gcloud auth print-access-token | cut -c 1-10

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          # Ensure Artifact Registry repo exists
          gcloud artifacts repositories create ahp-repo --repository-format=docker --location=us-central1 || true
          
          IMAGE_NAME="us-central1-docker.pkg.dev/ahp2o-495503/ahp-repo/ahp-backend:${{ github.sha }}"
          docker build -t $IMAGE_NAME .
          
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "us-central1-docker.pkg.dev/ahp2o-495503/ahp-repo/ahp-backend:${{ github.sha }}"
          format: 'table'
          exit-code: '1' # Fail the build on vulnerabilities
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker Image
        run: |
          IMAGE_NAME="us-central1-docker.pkg.dev/ahp2o-495503/ahp-repo/ahp-backend:${{ github.sha }}"
          docker push $IMAGE_NAME


      - name: Deploy API Service
        run: |
          IMAGE_NAME="us-central1-docker.pkg.dev/ahp2o-495503/ahp-repo/ahp-backend:${{ github.sha }}"
          gcloud run deploy ahp-api \
            --image $IMAGE_NAME \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --network ahp-vpc \
            --subnet ahp-subnet \
            --vpc-egress private-ranges-only \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest,SECRET_KEY=SECRET_KEY:latest,JWT_PRIVATE_KEY=JWT_PRIVATE_KEY:latest,JWT_PUBLIC_KEY=JWT_PUBLIC_KEY:latest,ENCRYPTION_KEY=ENCRYPTION_KEY:latest" \
            --set-env-vars "ENVIRONMENT=production,CLOUD_PROVIDER=gcp,GCP_PROJECT_ID=ahp2o-495503,GCS_BUCKET_NAME=ahp2o-495503-storage"

      - name: Deploy Worker Service
        run: |
          IMAGE_NAME="us-central1-docker.pkg.dev/ahp2o-495503/ahp-repo/ahp-backend:${{ github.sha }}"
          gcloud run deploy ahp-worker \
            --image $IMAGE_NAME \
            --region us-central1 \
            --platform managed \
            --no-allow-unauthenticated \
            --network ahp-vpc \
            --subnet ahp-subnet \
            --vpc-egress private-ranges-only \
            --min-instances 1 \
            --command "bash" \
            --args "-c,python3 -m http.server \$PORT & arq app.workers.arq_worker.WorkerSettings" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,REDIS_URL=REDIS_URL:latest,SECRET_KEY=SECRET_KEY:latest,JWT_PRIVATE_KEY=JWT_PRIVATE_KEY:latest,JWT_PUBLIC_KEY=JWT_PUBLIC_KEY:latest,ENCRYPTION_KEY=ENCRYPTION_KEY:latest" \
            --set-env-vars "ENVIRONMENT=production,CLOUD_PROVIDER=gcp,GCP_PROJECT_ID=ahp2o-495503,GCS_BUCKET_NAME=ahp2o-495503-storage"

  deploy-frontends:
    name: Deploy Frontends to Firebase
    needs: auth-and-backend
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-deployer@ahp2o-495503.iam.gserviceaccount.com

      - name: Ensure Hosting Sites Exist
        run: |
          npx firebase-tools hosting:sites:create ahp-patient-app --project ahp2o-495503 --token "${{ secrets.FIREBASE_TOKEN }}" || true
          npx firebase-tools hosting:sites:create ahp-doctor-app --project ahp2o-495503 --token "${{ secrets.FIREBASE_TOKEN }}" || true
          npx firebase-tools target:apply hosting patient ahp-patient-app --project ahp2o-495503 --token "${{ secrets.FIREBASE_TOKEN }}"
          npx firebase-tools target:apply hosting doctor ahp-doctor-app --project ahp2o-495503 --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Deploy Patient App
        run: |
          cd patient-app
          npm install --legacy-peer-deps
          npm run build
          npx firebase-tools deploy --only hosting:patient --project ahp2o-495503 --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}"

      - name: Deploy Doctor App
        run: |
          cd doctor-app
          npm install --legacy-peer-deps
          npm run build
          npx firebase-tools deploy --only hosting:doctor --project ahp2o-495503 --non-interactive --token "${{ secrets.FIREBASE_TOKEN }}"
