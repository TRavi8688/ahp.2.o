          JWT_PUBLIC_KEY: "-----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAyIMn+A1JlkHhWRdjZYRm\nFnnUcaYAmHaIfsaafv+kPttQOHW0hvet9yTRF4lCik8Luhm2Xul7oP+EQ2FWcFyk\ngck0icXApkFfA7karAOri8jt+tgMVRtB7WEdOfH+Fz1ygQNsN2USMz1hFPuByded\nuleQt13kxwIuT1mQxHHgE/AEfZzWc7h5He5xNmdFvmA5nqD9cmvV0wCaTwJ2Oyo4\n1GEMSmqdXM8SEzoElqrTYQnLO9mTnBJ81+7MmmGYCkc2z6bD9Qr8u/BuX0HsTGXr\nyG/4en3afzUFBk5vwjP6xvbdho7bMn4Y2p3N1T7qrlskZ5MYGNeYn3Kw5nDQu58P\nDQIDAQAB\n-----END PUBLIC KEY-----"
          DATABASE_URL: "postgresql+asyncpg://user:pass@localhost/testdb"
          REDIS_URL: "redis://localhost:6379/0"
          ENCRYPTION_KEY: "Y2ktdGVzdC1lbmNyeXB0aW9uLWtleS1tdXN0LWJlLTMyLWJ5dGVz" # Base64 for 'ci-test-encryption-key-must-be-32-bytes'
