apiVersion: apps/v1
kind: Deployment
metadata:
  name: ahp-api
  namespace: ahp-prod
  labels:
    app: ahp-api
    tier: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ahp-api
  template:
    metadata:
      labels:
        app: ahp-api
    spec:
      # Enterprise-Grade Availability: Spread pods across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - ahp-api
              topologyKey: "kubernetes.io/hostname"
      
      # Zero-Trust Security: Run as non-root
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
        runAsNonRoot: true

      containers:
      - name: api
        image: ahp/api:v2.0.4 # Use immutable tags, not 'latest'
        imagePullPolicy: IfNotPresent
        
        # Hardened Security Context for the container
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
          privileged: false
        
        ports:
        - containerPort: 8000
        
        envFrom:
        - secretRef:
            name: ahp-secrets
        - configMapRef:
            name: ahp-config
        
        # Site Reliability: Probes
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        # Graceful Termination for DB connection draining
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sleep", "20"]

      terminationGracePeriodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: ahp-api-svc
  namespace: ahp-prod
spec:
  selector:
    app: ahp-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ahp-api-hpa
  namespace: ahp-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ahp-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
