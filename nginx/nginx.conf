worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # --- PERFORMANCE & DOS PROTECTION ---
    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 8m;
    large_client_header_buffers 2 1k;

    upstream api_server {
        server api:8000;
    }

    upstream doctor_app {
        server doctor-app:80;
    }

    upstream patient_app {
        server patient-app:80;
    }

    server {
        listen 80;
        server_name localhost;

        # --- ENTERPRISE SECURITY HEADERS ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http: https: ws: wss:;" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # --- NGINX-LEVEL WAF (BASIC) ---
        # Block common SQL Injection patterns
        if ($query_string ~* "union.*select.*\(") { return 403; }
        if ($query_string ~* "concat.*\(") { return 403; }
        # Block common XSS patterns
        if ($query_string ~* "<script.*?>") { return 403; }
        # Block common Path Traversal patterns
        if ($uri ~* "\.\./") { return 403; }

        # Route to Doctor App (Frontend)
        location / {
            proxy_pass http://doctor_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Rate limiting for frontend assets can be lighter
        }

        # Route to Patient App
        location /patient/ {
            proxy_pass http://patient_app/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API Proxies (Enforce Strict Limits)
        location /api {
            proxy_pass http://api_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Mandatory header enforcement
            proxy_set_header X-Request-Source "Hospyn-Enterprise-LB";
        }

        # WebSocket support (Secure context only)
        location /ws {
            proxy_pass http://api_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400; # 24h
        }

        # Health checks (No logging to avoid noise)
        location /health {
            access_log off;
            proxy_pass http://api_server/health;
        }
    }
}
