<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Mulajna Security Portal</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #050810;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        overflow: hidden;
      }
      #root {
        display: flex;
        height: 100%;
        width: 100%;
      }
      #fallback-ui {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #050810;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10000;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(99, 102, 241, 0.1);
        border-top: 4px solid #6366F1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
      // Catch ANY boot error and show it
      window.onerror = function(msg, url, line, col, error) {
        var errBox = document.getElementById('error-display');
        if (errBox) {
          errBox.style.display = 'block';
          errBox.innerHTML = '<strong>RUNTIME_CRITICAL:</strong> ' + msg + '<br/><small>' + url + ':' + line + '</small>';
        }
        return false;
      };
    </script>
  </head>

  <body>
    <div id="fallback-ui">
      <h1 style="color: #6366F1; letter-spacing: 15px; margin: 0; font-weight: 900;">MULAJNA</h1>
      <div class="spinner"></div>
      <div style="color: #94A3B8; letter-spacing: 4px; font-size: 10px;">ESTABLISHING QUANTUM TUNNEL...</div>
      <div id="error-display" style="display: none; margin-top: 40px; padding: 20px; border: 1px solid #EF4444; color: #EF4444; background: rgba(239, 68, 68, 0.1); max-width: 80%; font-family: monospace;"></div>
    </div>

    <div id="root"></div>

    <script>
      // Remove fallback UI once React app mounts successfully
      var checkInterval = setInterval(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          document.getElementById('fallback-ui').style.display = 'none';
          clearInterval(checkInterval);
        }
      }, 500);
      
      // Auto-hide fallback after 15 seconds to avoid hanging on splash
      setTimeout(function() {
        var fb = document.getElementById('fallback-ui');
        if (fb) fb.style.opacity = '0.5';
      }, 15000);
    </script>
  </body>
</html>
