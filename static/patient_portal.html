<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospyn Patient Portal (Stability Mode)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050810; }
        .syne { font-family: 'Syne', sans-serif; }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-slate-900/50 p-8 rounded-3xl border border-white/5 backdrop-blur-xl">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-indigo-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-indigo-500/20">
                <svg class="w-10 h-10 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                </svg>
            </div>
            <h1 class="syne text-4xl tracking-widest font-extrabold mb-2">Hospyn</h1>
            <p class="text-slate-400 text-sm tracking-wide">STABILITY PORTAL ACTIVE</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] text-indigo-400 font-bold tracking-widest ml-1 mb-2 block uppercase">Hospyn ID</label>
                <input type="text" id="hospynId" placeholder="Hospyn-XXXXXX" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-4 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-700">
            </div>
            <div>
                <label class="text-[10px] text-indigo-400 font-bold tracking-widest ml-1 mb-2 block uppercase">Password</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-4 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-700">
            </div>

            <button onclick="login()" id="loginBtn" class="w-full py-4 bg-gradient-to-r from-indigo-600 to-indigo-500 rounded-xl font-bold text-lg hover:shadow-lg hover:shadow-indigo-500/20 transition-all active:scale-[0.98]">
                SECURE LOGIN
            </button>
        </div>

        <div class="mt-10 text-center">
            <p class="text-slate-500 text-sm">New to Hospyn? <a href="#" class="text-indigo-400 font-semibold">Create Account</a></p>
        </div>
    </div>

    <script>
        async function login() {
            const hospynId = document.getElementById('hospynId').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            
            btn.innerText = 'AUTHENTICATING...';
            btn.disabled = true;

            try {
                const response = await fetch('http://localhost:8000/api/v1/patient/login-hospyn', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ hospyn_id: hospynId, password: password })
                });

                if (response.ok) {
                    const data = await response.json();
                    alert('SUCCESS: Secure session established! Token: ' + data.access_token.substring(0, 10) + '...');
                    window.location.reload();
                } else {
                    const err = await response.json();
                    alert('FAILURE: ' + (err.detail || 'Access Denied'));
                }
            } catch (e) {
                alert('NETWORK_ERROR: Unable to reach Hospyn Security Gateway.');
            } finally {
                btn.innerText = 'SECURE LOGIN';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
